<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kong Game - WebSocket Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }

    #connection-panel {
      background: rgba(0, 0, 0, 0.7);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      width: 400px;
    }

    #connection-panel.hidden {
      display: none;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #ddd;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.9);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s;
    }

    button.primary {
      background: #4CAF50;
      color: white;
    }

    button.primary:hover {
      background: #45a049;
      transform: translateY(-2px);
    }

    button.secondary {
      background: #2196F3;
      color: white;
    }

    button.secondary:hover {
      background: #0b7dda;
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
      transform: none;
    }

    #game-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #game-container.active {
      display: flex;
    }

    #game-canvas {
      border: 4px solid #fff;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      background: #87CEEB;
    }

    #game-info {
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 10px;
      width: 800px;
      text-align: center;
    }

    #status {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
    }

    .controls button {
      width: auto;
      padding: 10px 20px;
    }

    .status-connected {
      color: #4CAF50;
      font-weight: bold;
    }

    .status-disconnected {
      color: #f44336;
      font-weight: bold;
    }

    #players-list {
      margin-top: 10px;
      font-size: 14px;
    }

    .player-item {
      padding: 5px;
      background: rgba(255, 255, 255, 0.1);
      margin: 5px 0;
      border-radius: 5px;
    }

    #message-log {
      max-height: 150px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      font-family: monospace;
      text-align: left;
      margin-top: 10px;
    }

    .log-entry {
      margin: 2px 0;
      opacity: 0.8;
    }

    .log-sent { color: #4CAF50; }
    .log-recv { color: #2196F3; }
    .log-error { color: #f44336; }
    .log-info { color: #FFC107; }
  </style>
</head>
<body>
  <!-- Connection Panel -->
  <div id="connection-panel">
    <h1>🎮 Kong Game</h1>
    
    <div class="form-group">
      <label>WebSocket URL</label>
      <input id="ws-url" type="text" value="ws://localhost:3000/ws">
    </div>

    <div class="form-group">
      <label>User ID</label>
      <input id="user-id" type="text" placeholder="42" value="player1">
    </div>

    <div class="form-group">
      <label>Auth Token</label>
      <input id="auth-token" type="text" placeholder="your-jwt-token" value="test-token-123">
    </div>

    <div class="form-group">
      <label>Difficulté</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="normal" selected>Normal</option>
        <option value="difficult">Difficult</option>
        <option value="impossible">Impossible</option>
      </select>
    </div>

    <div class="form-group">
      <label>ID de partie (pour rejoindre)</label>
      <input id="game-id" type="text" placeholder="ID de la partie à rejoindre">
    </div>

    <button class="primary" id="connect-btn">Se connecter</button>
    <div class="actions">
      <button class="secondary" id="create-game-btn" disabled>Créer une partie</button>
      <button class="secondary" id="join-game-btn" disabled>Rejoindre une partie</button>
    </div>
  </div>

  <!-- Game Container -->
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    
    <div id="game-info">
      <div id="status">Status: <span class="status-disconnected">Déconnecté</span></div>
      <div id="players-list"></div>
      
      <div class="controls">
        <button class="secondary" id="disconnect-btn">Se déconnecter</button>
        <button class="primary" id="restart-btn">Nouvelle partie</button>
      </div>

      <div id="message-log"></div>
    </div>
  </div>

  <script>
    // ==================== Configuration ====================
    let socket = null;
    let isAuthenticated = false;
    let gameStarted = false;
    let userID = '';
    let difficulty = 'normal';

    // Game state
    const players = new Map();
    let localPlayer = {
      x: 50,
      y: 500,
      vSpeed: 0,
      hSpeed: 0,
      width: 30,
      height: 40,
      color: '#FF5722',
      isJumping: false
    };

    // Controls
    const keys = {
      left: false,
      right: false,
      space: false
    };

    // Throttling pour éviter le spam
    let lastActionTime = 0;
    const ACTION_THROTTLE = 100; // Envoyer max toutes les 100ms
    let spacePressed = false; // Tracker si la barre d'espace a déjà été traitée

    // ==================== DOM Elements ====================
    const connectionPanel = document.getElementById('connection-panel');
    const gameContainer = document.getElementById('game-container');
    const wsUrlInput = document.getElementById('ws-url');
    const userIdInput = document.getElementById('user-id');
    const authTokenInput = document.getElementById('auth-token');
    const difficultySelect = document.getElementById('difficulty');
    const gameIdInput = document.getElementById('game-id');
    const connectBtn = document.getElementById('connect-btn');
    const createGameBtn = document.getElementById('create-game-btn');
    const joinGameBtn = document.getElementById('join-game-btn');
    const disconnectBtn = document.getElementById('disconnect-btn');
    const restartBtn = document.getElementById('restart-btn');
    const statusEl = document.getElementById('status');
    const playersListEl = document.getElementById('players-list');
    const messageLog = document.getElementById('message-log');
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // ==================== Logging ====================
    function log(type, message) {
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      messageLog.appendChild(entry);
      messageLog.scrollTop = messageLog.scrollHeight;
    }

    // ==================== WebSocket Functions ====================
    function connect() {
      const url = wsUrlInput.value;
      userID = userIdInput.value;
      const token = authTokenInput.value;
      difficulty = difficultySelect.value;

      if (!url || !userID || !token) {
        alert('Veuillez remplir tous les champs');
        return;
      }

      log('info', `Connexion à ${url}...`);
      socket = new WebSocket(url);

      socket.addEventListener('open', () => {
        log('info', 'Connecté au serveur');
        statusEl.innerHTML = 'Status: <span class="status-connected">Connecté</span>';
        
        // Send auth
        sendMessage({
          type: 'auth',
          userID: userID,
          payload: { token: token }
        });
      });

      socket.addEventListener('message', (event) => {
        log('recv', event.data);
        try {
          const data = JSON.parse(event.data);
          
          // Si c'est un tableau, c'est un update de positions
          if (Array.isArray(data)) {
            log('info', `[positions] Reçu ${data.length} joueur(s)`);
            updateGameState({ players: data });
          } else {
            handleServerMessage(data);
          }
        } catch (e) {
          log('error', 'Invalid JSON received');
        }
      });

      socket.addEventListener('close', () => {
        log('info', 'Connexion fermée');
        statusEl.innerHTML = 'Status: <span class="status-disconnected">Déconnecté</span>';
        isAuthenticated = false;
        gameStarted = false;
        createGameBtn.disabled = true;
        joinGameBtn.disabled = true;
      });

      socket.addEventListener('error', (err) => {
        log('error', 'Erreur WebSocket');
      });
    }

    function sendMessage(msg) {
      if (socket && socket.readyState === WebSocket.OPEN) {
        const json = JSON.stringify(msg);
        socket.send(json);
        log('sent', json);
      }
    }

    function handleServerMessage(data) {
      switch (data.type) {
        case 'auth_response':
          if (data.status === 'authenticated') {
            isAuthenticated = true;
            createGameBtn.disabled = false;
            joinGameBtn.disabled = false;
            log('info', `[auth_response] Authentifié avec succès`);
          } else {
            log('error', `[auth_response] Authentification échouée`);
          }
          break;
        
        case 'ack':
          log('info', `[ack] Message ${data.receivedType} reçu par le serveur`);
          break;
        
        case 'gameCreated':
          log('info', `[gameCreated] Partie créée avec succès (ID: ${data.gameId})`);
          startGame();
          break;
        
        case 'gameNotCreated':
          log('error', `[gameNotCreated] Erreur : Impossible de créer la partie (ID: ${data.gameId})`);
          createGameBtn.disabled = false;
          break;
        
        case 'gameJoined':
          log('info', `[gameJoined] Partie rejointe avec succès (ID: ${data.gameId})`);
          startGame();
          break;
        
        case 'gameNotJoined':
          log('error', `[gameNotJoined] Erreur : Impossible de rejoindre la partie (ID: ${data.gameId})`);
          createGameBtn.disabled = false;
          joinGameBtn.disabled = false;
          break;
        
        case 'gameUpdate':
          log('info', `[gameUpdate] Reçu ${data.players ? data.players.length : 0} joueur(s)`);
          updateGameState(data);
          break;
        
        case 'error':
          log('error', `[error] ${data.error || 'Erreur serveur'}`);
          break;
        
        default:
          log('info', `[${data.type}] Message reçu`);
          break;
      }
    }

    function createGame() {
      createGameBtn.disabled = true;
      joinGameBtn.disabled = true;

      sendMessage({
        type: 'kong',
        userID: userID,
        payload: {
          type: 'globalAction',
          datas: ['createGame', difficulty]
        }
      });
      log('info', 'Création de partie...');
    }

    function joinGame() {
      const targetGameId = gameIdInput.value.trim();
      if (!targetGameId) {
        log('error', 'Veuillez renseigner un ID de partie pour rejoindre');
        return;
      }

      createGameBtn.disabled = true;
      joinGameBtn.disabled = true;

      sendMessage({
        type: 'kong',
        userID: userID,
        payload: {
          type: 'globalAction',
          datas: ['joinGame', targetGameId],
        }
      });
      log('info', `Rejoindre la partie ${targetGameId}...`);
    }

    function sendGameAction(action) {
      sendMessage({
        type: 'kong',
        userID: userID,
        payload: {
          type: 'gameAction',
          datas: [action, difficulty]
        }
      });
    }

    // ==================== Game Logic ====================
    function startGame() {
      gameStarted = true;
      connectionPanel.classList.add('hidden');
      gameContainer.classList.add('active');
      log('info', 'Partie démarrée !');
      gameLoop();
    }

    function updateGameState(data) {
      // Update players from server
      if (data && data.players) {
        players.clear();
        data.players.forEach(p => {
          players.set(p.id, {
            id: p.id,
            x: p.x,
            y: p.y,
            vSpeed: p.vSpeed,
            hSpeed: p.hSpeed,
            maxSpeed: p.maxSpeed,
            width: 30,
            height: 40,
            color: p.id === userID ? '#FF5722' : '#2196F3'
          });
        });
      }
    }

    function gameLoop() {
      if (!gameStarted) return;

      // Clear canvas
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw ground
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

      // Handle input and send to server avec throttling
      const now = Date.now();
      if (now - lastActionTime >= ACTION_THROTTLE) {
        if (keys.left) {
          sendGameAction('goLeft');
          lastActionTime = now;
        } else if (keys.right) {
          sendGameAction('goRight');
          lastActionTime = now;
        }
      }

      // Barre d'espace : une seule fois par appui
      if (keys.space && !spacePressed) {
        sendGameAction('jump');
        spacePressed = true;
        lastActionTime = now;
      }

      // Draw all players from server state
      players.forEach((player) => {
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        
        // Draw player name
        ctx.fillStyle = '#fff';
        ctx.font = '14px Arial';
        ctx.fillText(player.id, player.x, player.y - 5);
      });

      // Draw instructions
      ctx.fillStyle = '#000';
      ctx.font = '16px Arial';
      ctx.fillText('← → pour bouger, ESPACE pour sauter', 20, 30);

      requestAnimationFrame(gameLoop);
    }

    // ==================== Event Listeners ====================
    connectBtn.addEventListener('click', connect);
    createGameBtn.addEventListener('click', createGame);
    joinGameBtn.addEventListener('click', joinGame);
    
    disconnectBtn.addEventListener('click', () => {
      if (socket) socket.close();
      gameStarted = false;
      gameContainer.classList.remove('active');
      connectionPanel.classList.remove('hidden');
    });

    restartBtn.addEventListener('click', () => {
      createGame();
    });

    // Keyboard controls
    window.addEventListener('keydown', (e) => {
      if (!gameStarted) return;
      
      switch(e.key) {
        case 'ArrowLeft':
          keys.left = true;
          e.preventDefault();
          break;
        case 'ArrowRight':
          keys.right = true;
          e.preventDefault();
          break;
        case ' ':
          keys.space = true;
          e.preventDefault();
          break;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (!gameStarted) return;
      
      switch(e.key) {
        case 'ArrowLeft':
			keys.left = false;
			break;
        case 'ArrowRight':
          keys.right = false;
          break;
        case ' ':
			spacePressed = false;
        	keys.space = false;
        	break;
      }
    });
  </script>
</body>
</html>
