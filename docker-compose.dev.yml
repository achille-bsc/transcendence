secrets:
    github_oauth_id:
        file: secrets/github_oauth_id
    github_oauth_secret:
        file: secrets/github_oauth_secret
    api_pass:
        file: secrets/api_pass
    db_password:
        file: secrets/db_password
    jwt_secret:
        file: secrets/jwt_secret