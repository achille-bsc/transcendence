# ======================== USER MANAGEMENT ========================
    user-management-service:
        build:
            context: ./user-management-service
            dockerfile: Dockerfile
            additional_contexts:
                shared_ressources: ./shared
        expose:
            - "3003"
        secrets:
            - api_pass
        develop:
            watch:
                - path: ./**/*.tsx
                  action: sync+exec
                  target: /app
                  exec:
                    command: "./scripts/handle_file_change.sh {{ .Path }}"
                - path: ../shared/scripts
                  target: /app/scripts
                  action: sync
        depends_on:
            database-service:
                condition: service_healthy
                restart: true
        restart: unless-stopped

volumes:
    caddy-volume: 
    avatars-volume:

networks:
    transcendence-network:
        driver: bridge

secrets:
    github_oauth_id:
        file: secrets/github_oauth_id
    github_oauth_secret:
        file: secrets/github_oauth_secret
    api_pass:
        file: secrets/api_internal_key
    db_password:
        file: secrets/db_password
    jwt_secret:
        file: secrets/jwt_secret
