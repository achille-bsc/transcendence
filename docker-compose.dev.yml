name: transcendence

services:
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - "8443:443"
            - "8080:80"
        develop:
            watch:
                - path: ./**/*.tsx
                  action: sync+exec
                  target: /app
                  exec:
                    command: "./scripts/handle_file_change.sh {{ .Path }}"
                - path: ../shared/scripts
                  target: /app/scripts
                  action: sync
        restart: unless-stopped
