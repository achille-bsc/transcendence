# ======================== FRONT ========================
    frontend:
        container_name: frontend
        build:
            context: ./frontend
            dockerfile: Dockerfile
            additional_contexts: 
                shared_ressources: ./shared
        expose:
            - "3000"
        develop:
            watch:
                - path: ./frontend
                  action: sync
                  target: /app
                  ignore:
                    - .git
                    - .dockerignore
                #   exec:
                #     command: "./scripts/handle_file_change.sh {{ .Path }}"
                # - path: shared/scripts
                #   target: /app/scripts
                #   action: sync
        networks:
            - transcendence-network
        restart: unless-stopped
