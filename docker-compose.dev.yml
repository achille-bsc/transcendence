    database-service:
        build:
            context: ./database-service
            dockerfile: Dockerfile
        expose: 
            - "5000" # check if port is acceptable
        environment:
            DB_USER: "user"
            DB_PASS_FILE: /run/secrets/db_password
            LAUNCH_MODE: "dev"
        env_file: ./.env
        secrets:
            - db_password
            - api_pass
        develop:
            watch:
                - path: ./**/*.tsx
                  action: sync+exec
                  target: /app
                  exec:
                    command: "./scripts/handle_file_change.sh {{ .Path }}"
                - path: ../shared/scripts
                  target: /app/scripts
                  action: sync
        volumes:
            - ./db_data:/app/data # bind mount for now so that the db can be checked outside
        restart: unless-stopped
