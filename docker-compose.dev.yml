# ======================== DB ========================
    database-service:
        container_name: database-service
        env_file: .env
        build:
            context: ./database-service
            dockerfile: Dockerfile
            additional_contexts: 
                shared_ressources: ./shared
        expose: 
            - "5000" # check if port is acceptable
        environment:
            DATABASE_URL: ${DATABASE_URL}
            DB_USER: "user"
            DB_PASS_FILE: /run/secrets/db_password
            LAUNCH_MODE: "dev"
        secrets:
            - db_password
            - api_pass
        develop:
            watch:
                - path: ./database-service
                  action: sync+exec
                  target: /app
                  exec:
                    command: "./scripts/handle_file_change.sh {{ .Path }}"
                - path: shared/scripts
                  target: /app/scripts
                  action: sync
        volumes:
            - ./db_data:/app/data # bind mount for now so that the db can be checked outside
        networks:
            - transcendence-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"] #Probably need to put https in future
            interval: 10s
            timeout: 30s
            retries: 5
            start_period: 5s
