name: transcendence

services:
# ========================= CADDY ========================
    caddy:
        container_name: caddy
        build:
            context: ./caddy-service
            dockerfile: Dockerfile
        ports:
            - "8443:443"
            - "8080:80"
        networks:
            - transcendence-network
        environment:
            - XDG_CONFIG_HOME="/app/data"
        volumes:
            - caddy-volume:/data/caddy/
        develop:
            watch:
              - action: sync+exec
                path: ./caddy-service/
                target: /app
                ignore:
                    - .dockerfile
                    - Dockerfile
                exec:
                    command: "caddy reload"
        depends_on:
            frontend:
                condition: service_started
            database-service:
                condition: service_healthy
            # auth-service:
            #     condition: service_started
            # chat-service:
            #     condition: service_started
            # age-of-war-service:
            #     condition: service_started
            # file-management-service:
            #     condition: service_started
            # kong-service:
            #     condition: service_started
            # user-analytics-service:
            #     condition: service_started
            # user-management-service:
            #     condition: service_started
        restart: always
