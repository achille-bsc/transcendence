# NOTE: secrets are mounted in the container at /run/secrets/<secret_name>

name: transcendence

services:
# ========================= CADDY ========================
    caddy:
        container_name: caddy
        build:
            context: ./caddy-service
            dockerfile: Dockerfile
        ports:
            - "8443:443"
            - "8080:80"
        networks:
            - transcendence-network
        volumes:
            - caddy-volume:/data/caddy/
            - ./certificates/public:/app/certs
        develop:
            watch:
              - action: sync+exec
                path: ./caddy-service/
                target: /app
                ignore:
                    - .dockerfile
                    - Dockerfile
                exec:
                    command: "caddy reload"
        depends_on:
            frontend:
                condition: service_started
            database-service:
                condition: service_healthy
            auth-service:
                condition: service_started
            chat-service:
                condition: service_started
            kong-service:
                condition: service_started
            user-management-service:
                condition: service_started
        restart: always

# ======================== FRONT ========================
    frontend:
        container_name: frontend
        build:
            context: ./frontend
            dockerfile: Dockerfile
            additional_contexts: 
                shared_ressources: ./shared
        expose:
            - "3000"
        develop:
            watch:
                - path: ./frontend
                  action: sync
                  target: /app
                  ignore:
                    - .git
                    - .dockerignore
                    - Dockerfile
        networks:
            - transcendence-network
        restart: unless-stopped

# ======================== AUTHENTICATION ========================
    auth-service:
        build:
            context: ./auth-service
            dockerfile: Dockerfile
            additional_contexts:
                shared_ressources: ./shared
        expose:
            - "3001"
        secrets:
            - api_pass
            - jwt_secret
            - github_oauth_id
            - github_oauth_secret
        develop:
            watch:
                - path: ./auth-service
                  action: sync
                  target: /app
                  ignore:
                    - .git
                    - .dockerignore
                    - Dockerfile
        volumes:
            - ./certificates/private/auth-service.key:/app/certs/srv.key:ro
            - ./certificates/public/auth-service.crt:/app/certs/srv.crt:ro
        depends_on:
            user-management-service:
                condition: service_started
                restart: true
            database-service:
                condition: service_healthy
                restart: true
        restart: unless-stopped

# ======================== CHAT ========================
    chat-service:
        build:
            context: ./chat-service
            dockerfile: Dockerfile
            additional_contexts:
                shared_ressources: ./shared
        expose:
            - "3004"
        secrets:
            - api_pass
            - jwt_secret
            - github_oauth_id
            - github_oauth_secret
        develop:
            watch:
                - path: ./chat-service
                  action: sync
                  target: /app
                  ignore:
                    - .git
                    - .dockerignore
                    - Dockerfile
        volumes:
            - ./certificates/private/chat-service.key:/app/certs/srv.key:ro
            - ./certificates/public/chat-service.crt:/app/certs/srv.crt:ro
        depends_on:
            database-service:
                condition: service_healthy
                restart: true
            user-management-service:
                condition: service_started
                restart: true
        restart: unless-stopped
        
# ======================== DB ========================
    database-service:
        container_name: database-service
        env_file: .env
        build:
            context: ./database-service
            dockerfile: Dockerfile
            additional_contexts: 
                shared_ressources: ./shared
        ports: # TEMPORARY
            - "5555:5555"  # ONLY TO CHECK DB FROM OUTSIDE, SO ONLY FOR DEV
        expose: 
            - "5000"
        environment:
            DATABASE_URL: ${DATABASE_URL}
            DB_USER: "user"
            DB_PASS_FILE: /run/secrets/db_password
            LAUNCH_MODE: "dev"
        secrets:
            - db_password
            - api_pass
        develop:
            watch:
                - path: ./database-service
                  action: sync+exec
                  target: /app
                  exec:
                    command: "./scripts/handle_file_change.sh {{ .Path }}"
                - path: shared/scripts
                  target: /app/scripts
                  action: sync
        volumes:
            - db-volume:/app/data 
            - ./certificates/private/database-service.key:/app/certs/db.key:ro
            - ./certificates/public/database-service.crt:/app/certs/db.crt:ro
        networks:
            - transcendence-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "curl -f --cacert /app/certs/db.crt https://localhost:5000/health || exit 1"]
            interval: 10s
            timeout: 30s
            retries: 5
            start_period: 5s

# ======================== KONG ========================
    kong-service:
        build:
            context: ./kong-service
            dockerfile: Dockerfile
        expose:
            - "3000"
        develop:
            watch:
              - action: sync
                path: ./kong-service
                target: /app
                ignore:
                    - Dockerfile
                    - .dockerignore
                    - .gitignore
        volumes:
            - ./certificates/private/kong-service.key:/app/certs/srv.key:ro
            - ./certificates/public/kong-service.crt:/app/certs/srv.crt:ro
        restart: unless-stopped

# ======================== AVATAR FILLER ========================
    avatar-copier:
        image: alpine:3.22
        volumes:
            - ./user-management-service/default_avatars:/staging:ro
            - avatars-volume:/app/avatars
        command: >
            sh -c "if [ -z \"$$(ls -A /app/data)\" ]; then 
                echo 'Copying data...'; 
                cp -a /staging/ /app/avatars/; 
            else 
                echo 'Data already exists.'; 
            fi"

# ======================== USER MANAGEMENT ========================
    user-management-service:
        build:
            context: ./user-management-service
            dockerfile: Dockerfile
            additional_contexts:
                shared_ressources: ./shared
        expose:
            - "3003"
        secrets:
            - api_pass
        develop:
            watch:
                - path: ./**/*.tsx
                  action: sync+exec
                  target: /app
                  exec:
                    command: "./scripts/handle_file_change.sh {{ .Path }}"
        volumes:
            - avatars-volume:/app/avatars
            - ./certificates/private/user-management-service.key:/app/certs/srv.key:ro
            - ./certificates/public/user-management-service.crt:/app/certs/srv.crt:ro
        depends_on:
            avatar-copier:
                condition: service_completed_successfully
            database-service:
                condition: service_healthy
                restart: true
        restart: unless-stopped

volumes:
    caddy-volume: 
    avatars-volume:
    db-volume:

networks:
    transcendence-network:
        driver: bridge

secrets:
    github_oauth_id:
        file: secrets/github_oauth_id
    github_oauth_secret:
        file: secrets/github_oauth_secret
    api_pass:
        file: secrets/api_internal_key
    db_password:
        file: secrets/db_password
    jwt_secret:
        file: secrets/jwt_secret
